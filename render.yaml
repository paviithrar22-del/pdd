services:
  - type: web
    name: cybershield-backend
    runtime: docker
    region: singapore       # Closest to India
    plan: free              # Free tier
    # plan: starter         # $7/mo — only 512MB RAM, insufficient for ML models
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./cybershield.db
      - key: DEBUG
        value: false
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # update after Vercel deploy
      - key: SMTP_HOST
        sync: false   # fill in Render dashboard
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_EMAIL
        sync: false   # fill in Render dashboard
      - key: SMTP_PASSWORD
        sync: false   # fill in Render dashboard
