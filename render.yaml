services:
  - type: web
    name: cybershield-backend
    runtime: python
    region: singapore       # Closest to India
    plan: standard          # $25/mo — needed for 2GB RAM (torch + transformers + Playwright)
    # plan: starter         # $7/mo — only 512MB RAM, insufficient for ML models
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./cybershield.db
      - key: DEBUG
        value: false
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # update after Vercel deploy
      - key: SMTP_HOST
        sync: false   # fill in Render dashboard
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_EMAIL
        sync: false   # fill in Render dashboard
      - key: SMTP_PASSWORD
        sync: false   # fill in Render dashboard
